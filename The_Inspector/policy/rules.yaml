rules:
  - name: "CVE critico"
    condition: cvss_score > 0.8
    action: REJECT

  - name: "Anomalia comportamentale alta"
    condition: anomaly_score > 0.7
    action: QUARANTINE

  - name: "Trust score basso"
    condition: trust_score < 0.4
    action: REJECT

  - name: "Trust score medio"
    condition: trust_score < 0.7
    action: QUARANTINE

  - name: "Asset sicuro"
    condition: trust_score >= 0.7
    action: ALLOW